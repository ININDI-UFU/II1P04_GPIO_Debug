[env:esp32dev]
build_type = debug
debug_tool = esp-builtin
debug_speed = 1000
debug_load_mode = manual
debug_init_cmds =
    define pio_reset_halt_target
    monitor reset
    maintenance flush register-cache
    end
    define pio_reset_run_target
    monitor reset
    end
    target extended-remote $DEBUG_PORT

monitor_speed = 115200
upload_speed = 460800

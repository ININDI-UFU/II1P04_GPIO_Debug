[data]
kitId=0

[platformio]
extra_configs = platformio_debug.ini ;Para debug, use esse arquivo e deixe as flags USB comentadas:

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
; board = esp32dev ;Para ESP32, use esse board e deixe as flags USB comentadas:
board = esp32-s3-devkitc1-n16r8
framework = arduino

; upload_protocol = espota ;Caso use OTA
; upload_port = iikit${data.kitId}.local ;Caso use OTA

build_src_filter = +<esp1.cpp>
build_flags =
    -DKIT_ID=${data.kitId}
    -DKIT_HOSTNAME='"iikit${data.kitId}"'
    -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    adafruit/Adafruit BusIO @ ^1.16.0
    tzapu/WiFiManager @ ^2.0.0

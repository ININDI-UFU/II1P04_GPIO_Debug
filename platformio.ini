[data]
kitId=0

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip ; Arduino-ESP32 v3.x | timerBegin(freq) API + IDF v5
; board = esp32dev ;Para ESP32, use esse board e deixe as flags USB comentadas:
board = esp32-s3-devkitc-1 ;Para ESP32-S3, troque esse board e descomente as flags USB:
framework = arduino
monitor_speed = 115200

build_type = debug ;Caso use Debug com ESP-BUILTIN, use esse build_type. Para debug com USB-Serial-JTAG, use default.
debug_tool = esp-builtin ;Caso use Debug com ESP-BUILTIN, use esse debug_tool. Para debug com USB-Serial-JTAG, use jlink
debug_init_break = tbreak setup ;Caso use Debug com ESP-BUILTIN, use um breakpoint na função setup() para evitar erros de timeout. Para debug com USB-Serial-JTAG, use tbreak loop.
debug_speed = 1000 ;Caso use Debug com ESP-BUILTIN, use uma velocidade de 1000 para evitar erros de timeout. Para debug com USB-Serial-JTAG, use a mesma velocidade do monitor (115200).

; upload_protocol = espDebug com ESP-BUILTIN, use um breakpoint na função setup() para evitar erros de timeout. Para debug com USB-Serial-JTAG, use tbreak loop. ;Caso use OTA
; upload_port = iikit${data.kitId}.local ;Caso use OTA

build_src_filter = +<esp1.cpp>
build_flags = 
    -DKIT_ID=${data.kitId} 
    -DKIT_HOSTNAME='"iikit${data.kitId}"'
    -DARDUINO_USB_CDC_ON_BOOT=0 ;Se for usar ESP32-S3 serial via USB nativa no boot, mantenha, se não, comente esta linha.
    
lib_deps =
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    adafruit/Adafruit BusIO @ ^1.16.0
    tzapu/WiFiManager @ ^2.0.0

